services:
  # Web Service
  - type: web
    name: busa-voting-portal
    env: node
    nodeVersion: 20
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_DISK_PATH
        value: /opt/render/project/data
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://busa-voting-portal.vercel.app,https://busa-voting-portal-cwwgearkj-shillah-naigagas-projects.vercel.app
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
